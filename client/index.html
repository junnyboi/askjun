<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>askJun — AI Portfolio</title>
    <meta name="description" content="Senior Frontend / Full Stack Software Engineer. Ask my AI agent anything about my experience building AI interfaces at Meta, payment systems at HoYoverse, and GDPR compliance at TikTok." />
    <meta property="og:title" content="askJun — AI Portfolio" />
    <meta property="og:description" content="Chat with an AI agent trained on Jun's career. Senior Frontend Engineer with experience at Meta, HoYoverse, TikTok, and Bank of Singapore." />
    <meta property="og:type" content="website" />
    <!-- Anti-flash: set theme class before render -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(theme);
      })();
    </script>
    <!-- Nothing Typography: Space Grotesk (display), Inter (body), Space Mono (technical) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
